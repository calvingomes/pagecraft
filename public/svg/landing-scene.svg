<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Abstract landscape illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9f2e8"/>
      <stop offset="0.55" stop-color="#f6f0c9"/>
      <stop offset="1" stop-color="#f2e7b8"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6d045"/>
      <stop offset="1" stop-color="#f2c23a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Distant mountains -->
  <path d="M0 390 C260 250 360 260 540 320 C690 372 840 305 980 270 C1120 235 1270 250 1600 340 L1600 900 L0 900 Z" fill="#2f7f52" opacity="0.55"/>
  <path d="M0 440 C230 320 370 340 520 390 C660 435 780 400 920 350 C1070 292 1220 315 1600 410 L1600 900 L0 900 Z" fill="#1e6b41" opacity="0.60"/>

  <!-- Near slopes -->
  <path d="M0 560 C260 500 420 520 610 560 C760 590 920 560 1120 520 C1320 480 1460 500 1600 540 L1600 900 L0 900 Z" fill="#1b5f3a"/>
  <path d="M0 650 C240 600 420 620 600 655 C760 685 960 660 1120 620 C1300 570 1440 585 1600 640 L1600 900 L0 900 Z" fill="#174f31"/>

  <!-- Road -->
  <path d="M770 900 C790 760 840 690 920 620 C1040 515 1090 455 1090 410 C1090 360 1035 325 960 310 C840 286 750 310 690 352 C620 401 570 488 540 585 C520 651 520 745 540 900 Z" fill="url(#road)" opacity="0.95"/>
  <path d="M778 900 C796 778 842 706 918 642 C1038 541 1098 472 1098 418 C1098 356 1036 318 962 304" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>

  <!-- Soft foreground haze -->
  <ellipse cx="550" cy="520" rx="520" ry="220" fill="url(#mist)" filter="url(#soft)"/>
  <ellipse cx="1180" cy="520" rx="520" ry="220" fill="url(#mist)" filter="url(#soft)"/>
</svg>
